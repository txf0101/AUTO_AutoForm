# AutoForm Agent MCP config snippet for Codex or another TOML-based MCP host.
#
# 小白读法：
# 这个文件只是“配置示例”，不是 Python 源码，也不会自己启动 AutoForm。
# 把下面这段配置放进 Codex 的 config.toml 后，Codex 才知道：
# 1. MCP server 的名字叫 autoform-agent。
# 2. 启动它要执行 conda run -n afagent python -m autoform_agent.mcp_server。
# 3. PYTHONPATH 要指向当前仓库，这样 Python 才能找到 autoform_agent 包。
# 真实使用时，一定要把 <path-to-cloned-repo> 换成这台电脑上的绝对路径。
#
# Copy this block into:
#   %USERPROFILE%\.codex\config.toml
#
# Replace <path-to-cloned-repo> with the absolute path of this full
# workspace repository on your computer. The independent AutoForm_MCP
# subproject has its own config file and starts `autoform_mcp_agent.mcp_server`;
# use AutoForm_MCP/codex_mcp_config.autoform-mcp.toml for that case.
#
# If the host cannot find conda, replace command with the full path to
# your afagent environment python.exe and change args to:
#   ['-m', 'autoform_agent.mcp_server']

[mcp_servers."autoform-agent"]
# command 是外部 MCP host 先执行的程序。这里用 conda，是为了进入 afagent 环境。
command = 'conda'
# args 是传给 conda 的参数。合起来就是：
# conda run -n afagent python -m autoform_agent.mcp_server
args = ['run', '-n', 'afagent', 'python', '-m', 'autoform_agent.mcp_server']
# 启动 MCP server 可能要导入不少 Python 模块，60 秒是给慢机器留的等待时间。
startup_timeout_sec = 60
# false 会禁用这个 MCP server；true 表示允许 Codex 尝试启动它。
enabled = true

[mcp_servers."autoform-agent".env]
# PYTHONPATH 告诉 Python 去哪里找本项目源码。这里必须是完整工作区仓库路径。
PYTHONPATH = '<path-to-cloned-repo>'
