<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoForm Agent Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      这个页面只保留四个工作区：用户输入、状态总结、终端式输出、API 输入与使用情况。
      AutoForm 工具选择和 OpenAI Agents SDK 调用都在 Python 后端完成，前端只负责提交
      prompt 和渲染后端返回的事实。
    -->
    <main class="console-shell" data-app-shell>
      <section class="console-panel input-panel" aria-label="用户输入">
        <div class="panel-heading">
          <span>1</span>
          <h1>用户输入</h1>
        </div>

        <form class="prompt-form" data-prompt-form>
          <label for="prompt-input">Prompt</label>
          <textarea
            id="prompt-input"
            data-prompt-input
            rows="8"
            placeholder="例如：读取当前 AutoForm 安装和队列状态，并规划 kinematic check。"
          ></textarea>

          <div class="input-row">
            <label for="bridge-endpoint">Runtime API</label>
            <input id="bridge-endpoint" data-bridge-endpoint value="http://127.0.0.1:4317/codex" />
          </div>

          <div class="input-actions">
            <button type="button" data-insert-example>示例</button>
            <button type="submit" data-send-button>发送</button>
          </div>
        </form>
      </section>

      <section class="console-panel summary-panel" aria-label="状态总结">
        <div class="panel-heading">
          <span>2</span>
          <h2>状态总结</h2>
        </div>

        <dl class="status-summary" data-status-summary>
          <div>
            <dt>连接</dt>
            <dd data-summary-connection>待发送</dd>
          </div>
          <div>
            <dt>运行时</dt>
            <dd data-summary-runtime>AutoForm Agent Runtime</dd>
          </div>
          <div>
            <dt>模型</dt>
            <dd data-summary-model>gpt-4.1-mini</dd>
          </div>
          <div>
            <dt>工具</dt>
            <dd data-summary-tools>待读取</dd>
          </div>
          <div>
            <dt>队列</dt>
            <dd data-summary-queue>待检查</dd>
          </div>
          <div>
            <dt>OpenAI</dt>
            <dd data-summary-openai>未调用</dd>
          </div>
        </dl>
      </section>

      <section class="console-panel terminal-panel" aria-label="状态报告和输出">
        <div class="panel-heading">
          <span>3</span>
          <h2>状态报告和输出</h2>
        </div>
        <pre class="terminal-output" data-terminal-output aria-live="polite">AutoForm Agent Console ready.
Runtime endpoint: http://127.0.0.1:4317/codex
Waiting for prompt...</pre>
      </section>

      <section class="console-panel api-panel" aria-label="API 输入以及 API 使用情况">
        <div class="panel-heading">
          <span>4</span>
          <h2>API 输入以及 API 使用情况</h2>
        </div>

        <div class="api-grid">
          <div>
            <label>Endpoint</label>
            <code data-api-endpoint>http://127.0.0.1:4317/codex</code>
          </div>
          <div>
            <label>SDK</label>
            <code data-api-sdk>待检查</code>
          </div>
          <div>
            <label>API Key</label>
            <code data-api-key>待检查</code>
          </div>
          <div>
            <label>OpenAI Call</label>
            <code data-api-openai-called>false</code>
          </div>
        </div>

        <div class="api-block">
          <label>Request payload</label>
          <pre data-api-input>{}</pre>
        </div>

        <div class="api-block">
          <label>Runtime response</label>
          <pre data-api-response>{}</pre>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
