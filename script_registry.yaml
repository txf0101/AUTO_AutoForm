- skill_id: skill_readiness_echo
  risk_level: L0
  description: Echo task readiness facts without touching AutoForm files or processes.
  required_params: task_id;evidence_bundle_id
  validation_rule: required_params_present
- skill_id: skill_evidence_count
  risk_level: L1
  description: Count local evidence references already passed in memory.
  required_params: evidence_bundle_id
  validation_rule: evidence_bundle_id_present
- skill_id: skill_prepare_summary
  risk_level: L2
  description: Build a dry-run preparation summary from candidate cards.
  required_params: task_id
  validation_rule: dry_run_summary_only
- skill_id: skill_material_aa6061_candidate_check
  risk_level: L1
  description: Check the AA6061 material candidate path and record missing material parameters without editing AutoForm projects.
  required_params: task_id;material_grade
  validation_rule: material_grade_present_and_dry_run_only
- skill_id: skill_material_database_query
  risk_level: L1
  description: Search the local AutoForm material library for candidate material cards without editing AutoForm projects.
  required_params: task_id;material_grade
  validation_rule: material_grade_present_and_dry_run_only
- skill_id: skill_material_source_candidate_set
  risk_level: L1
  description: Record a selected AutoForm material card path as a material source candidate without editing AutoForm projects.
  required_params: task_id;material_grade;material_source_path
  validation_rule: material_source_present_and_dry_run_only
- skill_id: skill_material_elastic_constants_candidate_set
  risk_level: L1
  description: Record user supplied elastic constants as material candidate fields without editing AutoForm projects.
  required_params: task_id;material_grade;elastic_modulus_mpa;poisson_ratio
  validation_rule: elastic_constants_present_and_dry_run_only
